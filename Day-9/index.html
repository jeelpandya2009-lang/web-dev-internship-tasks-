<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bento Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

        <!-- Navbar -->
        <nav class="navbar">

            <div class="logo">
                <div class="circle floating"></div>
            </div>

            <ul class="nav-links">
                <li><a href="#">Products</a></li>
                <li><a href="#">App</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>

            <div class="buttons">
                <button class="login">LOG IN</button>
                <button class="signup">SIGN UP</button>
            </div>

        </nav>

        <!-- Bento Grid -->
        <div class="grid-container">

            <!-- Hero Card -->
            <div class="card hero">

                <span class="small-text">MORE OFFERS</span>

                <h1>
                    There is<br>
                    something else<br>
                    for you
                </h1>

                <img
                    src="https://images.unsplash.com/photo-1606220588913-b3aacb4d2f46?w=500"
                    alt="Earbuds"
                >

                <button class="shop-btn">
                    All Products →
                </button>

            </div>

            <!-- Blog Card -->
            <div class="card blog">

                <span class="small-text">
                    WORLD OF HEARING TECHNOLOGY
                </span>

                <h2>View our blog</h2>

                <div class="circle-design"></div>

            </div>

            <!-- About Card -->
            <div class="card about">

                <span class="small-text">
                    DISCOVER OUR HISTORY
                </span>

                <h2>About us</h2>

            </div>

            <!-- Contact Card -->
            <div class="card contact">

                <span class="small-text">
                    HAVE SOME QUESTIONS?
                </span>

                <h2>Contact us</h2>

            </div>

        </div>

    </div>

</body>
</html>
